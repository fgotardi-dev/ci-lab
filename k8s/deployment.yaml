apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-lab
  template:
    metadata:
      labels:
        app: devops-lab
    spec:
      containers:
        - name: devops-lab
          image: 766298030618.dkr.ecr.us-east-1.amazonaws.com/devops-lab-flask:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
